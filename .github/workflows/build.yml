name: Build (Abjad)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build score (LilyPond + PDF + MIDI)
        run: make abjad

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modus-operandi-abjad
          path: |
            build/modus-operandi-abjad.ly
            build/modus-operandi-abjad.pdf
            build/modus-operandi-abjad.midi
