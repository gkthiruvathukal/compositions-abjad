name: Build (Abjad)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: codello/setup-lilypond@v0.1.0
        with:
          lilypond-version: "2.24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build score (LilyPond + PDF + MIDI)
        run: make abjad

      - name: Install FluidSynth
        run: sudo apt-get update && sudo apt-get install -y fluidsynth

      - name: Render MIDI to WAV
        run: ./midi2wav.sh build/modus-operandi-abjad.midi build/modus-operandi-abjad.wav

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modus-operandi-abjad
          path: |
            build/modus-operandi-abjad.ly
            build/modus-operandi-abjad.pdf
            build/modus-operandi-abjad.midi
            build/modus-operandi-abjad.wav

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            build/modus-operandi-abjad.pdf \
            build/modus-operandi-abjad.midi \
            build/modus-operandi-abjad.ly \
            build/modus-operandi-abjad.wav
