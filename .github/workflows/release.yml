name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LilyPond
        uses: jeandeaual/setup-lilypond@v1
        with:
          lilypond-version: "2.24.4"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build score (LilyPond + PDF + MIDI)
        run: make abjad

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            build/modus-operandi-abjad.pdf \
            build/modus-operandi-abjad.midi \
            build/modus-operandi-abjad.ly
